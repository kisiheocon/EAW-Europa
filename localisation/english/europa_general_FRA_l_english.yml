FRA_EUROPA_DESC: "§Y§!\n\n\n\n\n\n\n\n£GFX_texticon_CSSc_europa_FRA_map \n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\n\nFollowing The Disaster of 1940 and the aftermath of Fall Gelb, France was shattered into three, The German Occupation Zone in the North centered in Paris, The Remaining Government Forces lead by Marshal Petain in Vichy, and the Free French Resistance in southern Africa. Championed by Charlies De Gaulle. However, unlike in our known history, relations between the Regime in Vichy and Berlin are far warmer."

EAW_WS_FRA: "Unified High Command Of Saint-Étienne"
EAW_WS_header_text_FRA: "Unified High Command Of Saint-Étienne"
EAW_WS_FRA_desc: "Following The Disaster of 1940 and the aftermath of Fall Gelb, France was shattered into three, The German Occupation Zone in the North centered in Paris, The Remaining Government Forces lead by Marshal Petain in Vichy, and the Free French Resistance in southern Africa. Championed by Charlies De Gaulle. However, unlike in our known history, relations between the Regime in Vichy and Berlin are far warmer.\n\nAs a consequence of Hitler seeing reason in a rare act of mercy, or drug induced mania, France was saved from many of the harsh conditions placed upon it in our history. Primarily a renegotiation of the \"Service Du Travail Obligatoire\", from the mere kidnap of countless French workers as defacto hostages to paid and respected workers of France. Alongside this the Petain Governments restrictions and limitations on armed forces and research were loosened, fueled by the ever belligerent French Resistance and increase Allied spy activity in the region. These acts, as well as agreements on broad and overall cooperation between Vichy And Berlin resulted in a new relationship in this ever uncertain region, from client state and master to that of reluctant but acquiescent allies. This relationship during the course of the war remained relatively stable. Preventing the activation of Operation Case Anton in 1942. With Hitler preferring a stable and regionally powerful French State to a costly and irritating occupation of all of France. This stable and friendly environment between the two states, as well as the urgency created by the German Declaration of War on the United States soon following Pearl Harbor fostered the creation of a joint Franco-German Research Initiative. With similar efforts taken in several locations throughout Axis Europe in an effort to spread out atomics research away from the prying eyes of allied spies and bombardments. This effort, combining the German \"Uranprojekt Frankreich\" itself a subdivision of the core German \"Uranverein\" and the Franco-Belgian \"L'initiative De Marseille\" this combined research group was centered in the relatively minor city of Saint Entienne, and became one of the core Axis research centers for Atomic and Element 665 Experimentation. Utilizing the significant stockpile of both resources accumulated by France prior to Fall Gelb from French Niger. And following years of research and development breakthroughs in early 1944 enough Nuclear material and Element 665 was refined to conduct one of the first major tests.\n\nAnd with rumors of a potential Allied Invasion somewhere alongside the channel the importance and security of this experiment was of prime importance to the Fuhrer. Much to the dismay and protest of his advisors and the OKW, The Fuhrer personally ordered the Elite S.S Charlemagne division to disengage from the Eastern Front and garrison both the Research site outside the city, and the city itself, amid potential Resistance and O.S.S activities. Alongside this in a shocking blunder despite rumors of an invasion, Erwin Rommel, then tasked with overseeing the defense of the Channel coast following the loss of Africa earlier in 1943. was dispatched to oversee the Experiment and inspect the sizable German Contingent there.\n\nAnd on one fateful morning in Early 1944 everything changed, one moment the morning chatter of an awaking city was heard... But the next in a hidden research outpost few had noticed, a blinding light, perhaps of God himself rose from the forest. And within mere moments had swallowed all of Saint Entienne with it.\n\nBut just where did the city go?"

